{% extends "base.html" %}

{% block title %}404 - Страница не найдена{% endblock %}

{% block content %}
<div class="error-container">
    <h1>404</h1>
    <h2>Страница не найдена</h2>
    <p>Возможно, произошла ошибка. Вернитесь обратно!</p>
    <a href="{{ url_for('index') }}" class="btn-primary">Вернуться на главную</a>
</div>

<style>
.error-container {
    text-align: center;
    padding: 100px 20px;
}
.error-container h1 {
    font-size: 8rem;
    color: #d4a574;
}
.error-container h2 {
    font-size: 2rem;
    margin-bottom: 20px;
}
.error-container p {
    margin-bottom: 30px;
    color: #666;
}
</style>
{% endblock %}
