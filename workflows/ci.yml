name: CI/CD Pipeline - Deadstock Darling

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ========== JOB 1: ТЕСТИРОВАНИЕ ==========
  test:
    name: 🧪 Запуск тестов
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4
      
      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov selenium webdriver-manager
      
      - name: 🗄️ Создание базы данных
        run: |
          python -c "from app import app, db; with app.app_context(): db.create_all()"
      
      - name: 🚀 Запуск приложения в фоне
        run: |
          python app.py &
          sleep 5
      
      - name: 🧪 Запуск модульных тестов
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=html
      
      - name: 📊 Загрузка отчета о покрытии
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
      
      - name: 🔍 Проверка работоспособности API
        run: |
          curl -f http://localhost:5000/api/products || exit 1
          echo "✅ API работает"

  # ========== JOB 2: СБОРКА ==========
  build:
    name: 🏗️ Сборка Docker-образа
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4
      
      - name: 🐳 Сборка Docker-образа
        run: |
          docker build -t deadstock-darling:${{ github.sha }} .
          docker tag deadstock-darling:${{ github.sha }} deadstock-darling:latest
      
      - name: 📊 Сохранение образа
        run: |
          docker save deadstock-darling:latest -o deadstock-darling.tar
      
      - name: 📤 Загрузка артефакта
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: deadstock-darling.tar

  # ========== JOB 3: ДЕПЛОЙ (опционально) ==========
  deploy:
    name: 🚀 Деплой на сервер
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Скачивание Docker-образа
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      
      - name: 🐳 Загрузка Docker-образа
        run: |
          docker load -i deadstock-darling.tar
      
      - name: 🚀 Деплой через SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker stop deadstock-darling || true
            docker rm deadstock-darling || true
            docker run -d \
              --name deadstock-darling \
              -p 5000:5000 \
              -v /data/deadstock:/app/instance \
              --restart unless-stopped \
              deadstock-darling:latest
            echo "✅ Деплой выполнен успешно!"